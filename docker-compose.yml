version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    depends_on:
      - database
    restart: unless-stopped

  database:
    build: ./database
    container_name: database
    ports:
      - "8001:8001"
    volumes:
      - ./database/chroma_db:/data/chroma
      - ./database/lessons.json:/data/lessons.json:ro
    environment:
      CHROMA_PERSIST_DIR: "/data/chroma"
    restart: unless-stopped

networks:
  default:
    name: lessons_network