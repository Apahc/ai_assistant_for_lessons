<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lessons Widget</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="chat-launcher" id="chatLauncher" aria-label="Открыть ассистента">ИИ</button>

  <div class="chat-wrapper" id="chatWrapper">
    <div class="chat-header">
      <span>Ассистент по извлеченным урокам</span>
      <div class="chat-actions">
        <button id="expandChat" class="icon-btn" title="Расширить">⤢</button>
        <button id="closeChat" class="icon-btn" title="Закрыть">×</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="mode-bar" id="modeBar">
      <button class="mode-btn active" data-mode="chat">chat</button>
      <button class="mode-btn" data-mode="search">search</button>
      <button class="mode-btn" data-mode="document">document</button>
      <button class="mode-btn" data-mode="mail">mail</button>
    </div>
    <div class="composer">
      <input id="messageInput" type="text" placeholder="Сформулируйте запрос по урокам" />
      <button id="sendBtn" class="send-btn">➤</button>
    </div>
  </div>

  <div class="assistant-overlay" id="assistantOverlay">
    <div class="assistant-shell">
      <header class="assistant-header">
        <button id="assistantBack" class="icon-btn">←</button>
        <h1>Ассистент раздела "Извлеченные уроки"</h1>
        <span id="sessionBadge"></span>
      </header>
      <section class="assistant-main">
        <div class="assistant-messages" id="assistantMessages"></div>
        <div class="mode-bar wide" id="assistantModeBar">
          <button class="mode-btn active" data-mode="chat">chat</button>
          <button class="mode-btn" data-mode="search">search</button>
          <button class="mode-btn" data-mode="document">document</button>
          <button class="mode-btn" data-mode="mail">mail</button>
        </div>
        <div class="composer">
          <input id="assistantInput" type="text" placeholder="Сформулируйте запрос по урокам" />
          <button id="assistantSend" class="send-btn">➤</button>
        </div>
      </section>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat-widget.js"></script>
</body>
</html>
